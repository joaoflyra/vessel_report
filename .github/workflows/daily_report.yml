name: Daily Vessel Report

on:
  schedule:
    - cron: '*/30 * * * *'  # a cada 30min — dispara apos receber a position list do Cristiano
  workflow_dispatch:          # permite rodar manualmente

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic openpyxl reportlab

      - name: Run vessel report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        run: python vessel_report.py
